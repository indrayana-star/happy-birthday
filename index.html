<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Card - Nur Anisah</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(135deg,#ff4e9b,#8f5cff,#00c6ff);
}

/* BACKGROUND BINTANG */
.star{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    animation:blink 2s infinite;
}

@keyframes blink{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* CARD */
.card-container{
    perspective:2000px;
    z-index:10;
}

.card{
    width:350px;
    height:500px;
    position:relative;
    transform-style:preserve-3d;
    transition:1.2s;
}

.card.open{
    transform:rotateY(-160deg);
}

/* COVER */
.cover{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#ff5fa2,#ff80bf);
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    cursor:pointer;
    transform-origin:left;
    transition:1.2s;
    backface-visibility:hidden;
}

.card.open .cover{
    transform:rotateY(-160deg);
}

.cover h1{
    font-size:40px;
    margin-bottom:15px;
    animation:bounce 2s infinite;
}

.cover p{
    font-size:18px;
}

/* INSIDE CARD */
.inside{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    border-radius:20px;
    padding:40px 25px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#444;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.inside h2{
    font-size:40px;
    color:#ff4e9b;
    margin-bottom:15px;
}

.name{
    font-family:'Pacifico', cursive;
    font-size:38px;
    color:#8f5cff;
    margin-bottom:20px;
}

.inside p{
    font-size:18px;
    line-height:1.8;
}

/* BUTTON */
.btn{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4e9b;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
}

/* BALON */
.balloon{
    position:absolute;
    bottom:-150px;
    width:70px;
    height:90px;
    border-radius:50%;
    animation:float 10s linear infinite;
}

.balloon::after{
    content:"";
    position:absolute;
    width:2px;
    height:80px;
    background:white;
    left:34px;
    top:90px;
}

.red{background:#ff4d6d;}
.blue{background:#4d96ff;}
.yellow{background:#ffd93d;}
.green{background:#6bff95;}

@keyframes float{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* CONFETTI */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-20px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}
</style>
</head>

<body>

<!-- BALON -->
<div class="balloon red" style="left:5%; animation-delay:0s;"></div>
<div class="balloon blue" style="left:25%; animation-delay:2s;"></div>
<div class="balloon yellow" style="left:50%; animation-delay:4s;"></div>
<div class="balloon green" style="left:80%; animation-delay:1s;"></div>

<!-- KARTU -->
<div class="card-container">
    <div class="card" id="birthdayCard">

        <!-- DEPAN -->
        <div class="cover" onclick="openCard()">
            <h1>🎂 21 🎉</h1>
            <p>Klik Untuk Membuka</p>
        </div>

        <!-- DALAM -->
        <div class="inside">
            <h2>Happy Birthday</h2>

            <div class="name">Nur Anisah</div>

            <p>
                Selamat ulang tahun yang ke-21 ✨<br><br>

                Semoga panjang umur, sehat selalu,
                dimudahkan segala urusannya,
                dan semua impian serta harapanmu
                bisa tercapai 💖
            </p>

            <button class="btn" onclick="closeCard()">
                Tutup Kartu
            </button>
        </div>

    </div>
</div>

<script>

/* BUKA TUTUP KARTU */
function openCard(){
    document.getElementById("birthdayCard")
    .classList.add("open");
}

function closeCard(){
    document.getElementById("birthdayCard")
    .classList.remove("open");
}

/* CONFETTI */
for(let i=0;i<120;i++){

    let confetti=document.createElement("div");
    confetti.className="confetti";

    confetti.style.left=Math.random()*100+"vw";

    confetti.style.backgroundColor=
    `hsl(${Math.random()*360},100%,50%)`;

    confetti.style.animationDuration=
    (Math.random()*3+2)+"s";

    confetti.style.opacity=Math.random();

    confetti.style.width=
    confetti.style.height=
    (Math.random()*8+5)+"px";

    document.body.appendChild(confetti);
}

/* BINTANG */
for(let i=0;i<60;i++){

    let star=document.createElement("div");
    star.className="star";

    star.style.top=Math.random()*100+"vh";
    star.style.left=Math.random()*100+"vw";

    star.style.animationDuration=
    (Math.random()*3+1)+"s";

    document.body.appendChild(star);
}
</script>

</body>
</html>
